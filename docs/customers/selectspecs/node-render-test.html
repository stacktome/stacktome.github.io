<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SelectSpecs.com Reviews — Live Render Test</title>
<meta name="robots" content="noindex, nofollow">
<style>
  body{margin:0;font-family:Arial,sans-serif;background:#fff}
  .host-nav{background:#0b3d91;color:#fff;padding:14px 24px;font-size:15px}
  .host-nav a{color:#fff;text-decoration:none;margin-right:18px}
  .host-footer{background:#0b3d91;color:#cfe0ff;padding:18px 24px;font-size:13px;margin-top:40px}
  .status{max-width:880px;margin:16px auto 0;padding:0 20px;font-family:system-ui,sans-serif;font-size:13px;color:#67737f}
</style>
</head>
<body>
<nav class="host-nav"><a href="/">Home</a><a href="/glasses">Glasses</a><a href="/sunglasses">Sunglasses</a><a href="/reviews">Reviews</a></nav>
<p class="status" id="status">Loading live render from services.stacktome.com…</p>
<main id="app"></main>
<div class="host-footer">© SelectSpecs.com — host page chrome, not part of the render-service fragment</div>
<script>
// Internal test page ONLY — fetches the render fragment live, client-side, on every page load,
// so this always reflects current production state (no stale static snapshot to keep in sync).
// Uses the account's org backend apikey directly in the browser: normally never done (the org key
// has full account-wide access, not just this template), explicitly approved for this internal,
// noindex test page only. Never do this on a real customer-facing page — use the domain-restricted
// public key embedded in the fragment itself for that (see simulate-customer-site.js for the
// SSR-with-server-side-org-key integration model real customers should follow instead).
var API_BASE = 'https://services.stacktome.com/api/reviews';
var APIKEY = '7yjXSd44BDTdQ5iQu24rNJX6Rzi6miTW';
var TEMPLATE_ID = '720';
var ROOT_ID = 'selectspecs-reviews';

fetch(API_BASE + '/v1/templates/' + TEMPLATE_ID + '/page', {
  method: 'POST',
  headers: { apikey: APIKEY, 'Content-Type': 'application/json' },
  body: JSON.stringify({ rootId: ROOT_ID }),
}).then(function(r){
  if (!r.ok) throw new Error('render service returned ' + r.status);
  return r.text();
}).then(function(html){
  var app = document.getElementById('app');
  app.innerHTML = html;
  // innerHTML never executes embedded <script> tags — the fragment's own pagination/filter/AI-box
  // JS lives in one, so it has to be re-created and re-inserted to actually run.
  app.querySelectorAll('script').forEach(function(oldScript){
    var newScript = document.createElement('script');
    Array.prototype.forEach.call(oldScript.attributes, function(attr){ newScript.setAttribute(attr.name, attr.value); });
    newScript.textContent = oldScript.textContent;
    oldScript.parentNode.replaceChild(newScript, oldScript);
  });
  document.getElementById('status').textContent = 'Live render fetched at ' + new Date().toISOString();
}).catch(function(err){
  document.getElementById('status').textContent = 'Render fetch failed: ' + err.message;
});
</script>
</body>
</html>
