<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Order Upload</title>
  <style>
    body {
      background: #f6f7fb;
      font-family: 'Segoe UI', Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      margin: 0;
      padding: 0;
    }
    .container {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 32px 32px 24px 32px;
      margin-top: 40px;
      width: 100%;
      max-width: 400px;
    }
    h2 {
      margin-top: 0;
      font-weight: 500;
      color: #354052;
      letter-spacing: 0.02em;
      text-align: center;
      margin-bottom: 24px;
    }
    form label {
      display: flex;
      flex-direction: column;
      font-size: 1rem;
      font-weight: 500;
      color: #495057;
      margin-bottom: 18px;
      letter-spacing: 0.01em;
    }
    form input[type="text"],
    form input[type="email"],
    form input[type="datetime-local"],
    form select {
      margin-top: 6px;
      padding: 10px 12px;
      font-size: 1rem;
      border: 1.3px solid #ccd0d5;
      border-radius: 6px;
      transition: border-color 0.2s;
      outline: none;
      background: #fafbfc;
      color: #2b2e32;
      font-family: inherit;
    }
    form input:focus,
    form select:focus {
      border-color: #368ade;
      background: #fff;
      box-shadow: 0 0 2px #368ade25;
    }
    button[type="submit"] {
      width: 100%;
      background: linear-gradient(90deg, #3f8efc 60%, #2762c8 100%);
      color: #fff;
      font-size: 1.09rem;
      font-weight: bold;
      margin-top: 4px;
      padding: 12px 0 10px 0;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      box-shadow: 0 2px 8px #368ade22;
      letter-spacing: 0.03em;
      transition: background 0.16s, box-shadow 0.16s, transform 0.13s;
    }
    button[type="submit"]:hover {
      background: linear-gradient(90deg, #2762c8 20%, #3f8efc 100%);
      box-shadow: 0 4px 14px #368ade44;
      transform: translateY(-1px) scale(1.01);
    }
    .msg-success {
      border: 1.5px solid #27ae60;
      background: #e9fbe8;
      color: #1d8244;
      border-radius: 5px;
      padding: 15px 10px;
      margin-top: 28px;
      font-weight: 600;
      word-break: break-all;
      text-align: center;
    }
    .msg-error {
      border: 1.5px solid #e74c3c;
      background: #fff0ef;
      color: #d20d16;
      border-radius: 5px;
      padding: 15px 10px;
      margin-top: 28px;
      font-weight: 600;
      word-break: break-all;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Create Review Request</h2>
    <form id="orderForm" autocomplete="off">
      <label>
        Email:
        <input type="email" name="email" required>
      </label>
      <label>
        First name:
        <input type="text" name="firstName" required>
      </label>
      <label>
        Last name:
        <input type="text" name="lastName">
      </label>
      <label>
        Requester Desk:
        <select name="requesterId" required>
          <option value="" disabled selected>-- Select Desk --</option>
          <option value="desk-1">Desk 1</option>
          <option value="desk-2">Desk 2</option>
          <option value="desk-3">Desk 3</option>
          <option value="desk-4">Desk 4</option>
          <option value="desk-5">Desk 5</option>
          <option value="desk-6">Desk 6</option>
          <option value="desk-7">Desk 7</option>
          <option value="desk-8">Desk 8</option>
          <option value="desk-9">Desk 9</option>
          <option value="desk-10">Desk 10</option>
        </select>
      </label>
      <label>
        Campaign:
        <select name="campaignId" required>
          <option value="" disabled selected>-- Select Campaign --</option>
          <option value="campaign-1">Campaign 1</option>
          <option value="campaign-2">Campaign 2</option>
        </select>
      </label>
      <label>
        Request Time:
        <input type="datetime-local" name="createdAt" id="createdAtInput" required>
      </label>
      <button type="submit">Add</button>
    </form>
    <div id="result"></div>
  </div>

  <script>
    window.addEventListener('DOMContentLoaded', () => {
      const now = new Date();
      now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
      document.getElementById('createdAtInput').value = now.toISOString().slice(0, 16);
    });

    document.getElementById('orderForm').onsubmit = async function(e) {
      e.preventDefault();
      
      const createdAtISO = new Date(e.target.createdAt.value).toISOString();

      const data = {
        orderId: e.target.orderId.value,
        channel: "form",
        event: "signup",
        orderLines: [
          {
            productSku: "1210",
            name: "Project Management",
            productType: "online-courses"
          }
        ],
        customer: {
          firstName: e.target.firstName.value,
          lastName: e.target.lastName.value,
          email: e.target.email.value,
          mobile: ""
        },
        requester: {
          id: e.target.requesterId.value,
          name: "",
          campaign: e.target.campaignId.value
        },
        websiteDomain: "itolrecruit.com",
        promotion: [
          {
            code: "",
            name: "",
            campaign: "",
            campaignType: "",
            discountType: "",
            customerType: "",
            medium: "email",
            source: ""
          }
        ],
        createdAt: createdAtISO
      };

      const apiurl = 'https://services.stacktome.com/api/events/v1/sales?apikey=1zpyK7gfUtWN2wVVxMqDl1kVNzuL4cF1';
      let msg, cls;

      try {
        const response = await fetch(apiurl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify([data])
        });

        let txt = await response.text();

        try {
          const parsed = JSON.parse(txt);
          if (parsed.success || response.ok) {
            msg = "✅ Success!";
            cls = "msg-success";
          } else {
            msg = "❌ Error: " + (parsed.failure || response.statusText);
            if (parsed.errors) msg += "<br>" + parsed.errors;
            cls = "msg-error";
          }
        } catch {
          if (response.ok) {
            msg = "✅ Success!";
            cls = "msg-success";
          } else {
            msg = "❌ Error: " + response.statusText + "<br>" + txt;
            cls = "msg-error";
          }
        }
      } catch (err) {
        msg = "❌ Error: " + err;
        cls = "msg-error";
      }

      const res = document.getElementById('result');
      res.innerHTML = msg;
      res.className = cls;
    };
  </script>
</body>
</html>
